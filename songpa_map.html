<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>송파구 아파트 실거래가 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Malgun Gothic', sans-serif; background: #0f172a; }
#map { width: 100%; height: 100vh; }

.info-panel {
  position: absolute; top: 12px; right: 12px; z-index: 1000;
  background: rgba(15,23,42,0.95); color: #e2e8f0; padding: 16px 20px;
  border-radius: 12px; min-width: 280px; backdrop-filter: blur(8px);
  border: 1px solid rgba(99,102,241,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.info-panel h2 { font-size: 15px; color: #818cf8; margin-bottom: 10px; }
.info-panel .stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.info-panel .stat:last-child { border: none; }
.info-panel .stat .label { color: #94a3b8; }
.info-panel .stat .value { color: #f1f5f9; font-weight: 600; }

.legend {
  position: absolute; bottom: 24px; left: 12px; z-index: 1000;
  background: rgba(15,23,42,0.95); color: #e2e8f0; padding: 14px 18px;
  border-radius: 12px; backdrop-filter: blur(8px);
  border: 1px solid rgba(99,102,241,0.3);
}
.legend h3 { font-size: 12px; color: #818cf8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px; }
.legend-circle { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }

.filter-panel {
  position: absolute; top: 12px; left: 12px; z-index: 1000;
  background: rgba(15,23,42,0.95); color: #e2e8f0; padding: 14px 18px;
  border-radius: 12px; backdrop-filter: blur(8px);
  border: 1px solid rgba(99,102,241,0.3);
}
.filter-panel h3 { font-size: 13px; color: #818cf8; margin-bottom: 8px; }
.filter-btn {
  display: inline-block; padding: 5px 12px; margin: 3px 2px; border-radius: 20px;
  font-size: 11px; cursor: pointer; border: 1px solid rgba(99,102,241,0.4);
  background: rgba(99,102,241,0.1); color: #c7d2fe; transition: all 0.2s;
}
.filter-btn:hover { background: rgba(99,102,241,0.3); }
.filter-btn.active { background: #6366f1; color: white; border-color: #6366f1; }

.custom-popup .leaflet-popup-content-wrapper {
  background: rgba(15,23,42,0.97); color: #e2e8f0; border-radius: 10px;
  border: 1px solid rgba(99,102,241,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.custom-popup .leaflet-popup-tip { background: rgba(15,23,42,0.97); }
.popup-title { font-size: 14px; font-weight: 700; color: #818cf8; margin-bottom: 6px; }
.popup-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.popup-row:last-child { border: none; }
.popup-label { color: #94a3b8; }
.popup-value { font-weight: 600; }
.popup-value.high { color: #f87171; }
.popup-value.mid { color: #fbbf24; }
.popup-value.low { color: #34d399; }
.popup-section { font-size: 11px; color: #6366f1; margin-top: 8px; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div id="map"></div>

<div class="filter-panel">
  <h3>데이터 필터</h3>
  <div>
    <span class="filter-btn active" onclick="toggleLayer('trade', this)">매매</span>
    <span class="filter-btn active" onclick="toggleLayer('jeonse', this)">전세</span>
    <span class="filter-btn active" onclick="toggleLayer('wolse', this)">월세</span>
  </div>
  <div style="margin-top:8px">
    <span class="filter-btn active" onclick="toggleLayer('dong', this)">동별 요약</span>
    <span class="filter-btn" onclick="toggleLayer('individual', this)">개별 거래</span>

<div class="info-panel">

  <div class="legend-item"><div class="legend-circle" style="background:#3b82f6"></div> 10억 미만</div>
  <h3 style="margin-top:10px">전세</h3>
  <div class="legend-item"><div class="legend-circle" style="background:#7c3aed; border-style:dashed"></div> 전세 보증금</div>

</div>

function getPriceColor(price10k) {
  if (price10k >= 300000) return '#dc2626';
  if (price10k >= 200000) return '#f97316';
  if (price10k >= 150000) return '#eab308';
  if (price10k >= 100000) return '#22c55e';
  return '#3b82f6';
}

function formatPrice(price10k) {
  return (price10k / 10000).toFixed(1) + '억';
}

function priceClass(price10k) {
  if (price10k >= 300000) return 'high';
  if (price10k >= 150000) return 'mid';
  return 'low';
}

// 레이어 그룹
const tradeDongLayer = L.layerGroup();
const jeonseDongLayer = L.layerGroup();
const wolseDongLayer = L.layerGroup();
const individualLayer = L.layerGroup();

// 동별 매매 원
Object.entries(tradeByDong).forEach(([dong, data]) => {
  const coords = dongCoords[dong];
  if (!coords) return;
  const color = getPriceColor(data.median);
  const radius = Math.max(180, Math.sqrt(data.count) * 80);

  const circle = L.circle(coords, {
    radius: radius,
    fillColor: color,
    fillOpacity: 0.5,
    color: color,
    weight: 2,
    opacity: 0.8
  });

  const jeonse = jeonseByDong[dong] || { count: 0, median: 0 };
  const gapRatio = data.median > 0 ? ((jeonse.median / data.median) * 100).toFixed(1) : '-';

  circle.bindPopup(`
    <div class="popup-title">${dong}</div>
    <div class="popup-section">매매</div>
    <div class="popup-row"><span class="popup-label">거래건수</span><span class="popup-value">${data.count}건</span></div>
    <div class="popup-row"><span class="popup-label">중위가</span><span class="popup-value ${priceClass(data.median)}">${formatPrice(data.median)}</span></div>
    <div class="popup-row"><span class="popup-label">84m² 중위</span><span class="popup-value ${priceClass(data.med84)}">${data.med84 ? formatPrice(data.med84) : 'N/A'}</span></div>
    <div class="popup-row"><span class="popup-label">가격범위</span><span class="popup-value">${formatPrice(data.min)} ~ ${formatPrice(data.max)}</span></div>

    <div style="font-size:11px;color:#94a3b8;line-height:1.5">${data.apts}</div>
  `, { className: 'custom-popup', maxWidth: 260 });

      className: '',

// 동별 전세 원 (매매 원 안쪽에 작게)

    fillOpacity: 0.35,
    color: '#7c3aed',
    weight: 2,
    opacity: 0.6,
    dashArray: '5,5'

  { name: "올림픽선수기자촌", dong: "방이동", lat: 37.5165, lng: 127.1200, price: 320000, area: 100.3, type: "매매" },
  { name: "올림픽훼밀리타운", dong: "문정동", lat: 37.4890, lng: 127.1220, price: 277000, area: 117.5, type: "매매" },
  { name: "잠실올림픽공원아이파크", dong: "풍납동", lat: 37.5230, lng: 127.1160, price: 225000, area: 84.9, type: "매매" },
];

individualTrades.forEach(t => {
  const color = getPriceColor(t.price);
  const marker = L.circleMarker([t.lat + (Math.random()-0.5)*0.001, t.lng + (Math.random()-0.5)*0.001], {
    radius: 6, fillColor: color, fillOpacity: 0.8, color: '#fff', weight: 1, opacity: 0.6
  });
  marker.bindPopup(`
    <div class="popup-title">${t.name}</div>
    <div class="popup-row"><span class="popup-label">위치</span><span class="popup-value">${t.dong}</span></div>
    <div class="popup-row"><span class="popup-label">거래가</span><span class="popup-value ${priceClass(t.price)}">${formatPrice(t.price)}</span></div>
    <div class="popup-row"><span class="popup-label">면적</span><span class="popup-value">${t.area}m²</span></div>
    <div class="popup-row"><span class="popup-label">유형</span><span class="popup-value">${t.type}</span></div>
  `, { className: 'custom-popup', maxWidth: 220 });
  individualLayer.addLayer(marker);
});

// 기본 레이어 추가
tradeDongLayer.addTo(map);
jeonseDongLayer.addTo(map);

const layers = {
  trade: { layer: tradeDongLayer, active: true },
  jeonse: { layer: jeonseDongLayer, active: true },
  wolse: { layer: wolseDongLayer, active: true },
  dong: { layer: null, active: true },
  individual: { layer: individualLayer, active: false }
};

function toggleLayer(name, btn) {
  const info = layers[name];
  if (name === 'individual') {
    if (info.active) {
      map.removeLayer(info.layer);
      btn.classList.remove('active');
    } else {
      info.layer.addTo(map);
      btn.classList.add('active');
    }
    info.active = !info.active;
    return;
  }
  if (info.layer) {
    if (info.active) {
      map.removeLayer(info.layer);
      btn.classList.remove('active');
    } else {
      info.layer.addTo(map);
      btn.classList.add('active');
    }
    info.active = !info.active;
  }
}
</script>
